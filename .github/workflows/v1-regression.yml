name: V1 Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VERIFY_V1_SUMMARY_FILE: artifacts/verify-v1-summary.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Seed baseline data
        run: npm run db:seed

      - name: Run v1 regression verify
        run: npm run verify:v1

      - name: Upload v1 regression summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-regression-summary
          path: artifacts/verify-v1-summary.json
          if-no-files-found: warn
